<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4fb477">
  <meta name="description" content="A mobile-friendly study planner and progress tracker">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234fb477' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='Arial'>⏰</text></svg>">
  <title>Time's Up — Study App</title>
  <style>
    body { margin: 0; padding: 0; }
    #app { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="app">
    <iframe src="times-up.html" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
  </div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('✅ Service Worker registered:', reg);
      }).catch(err => {
        console.log('❌ Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
